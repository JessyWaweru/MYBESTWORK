<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JESSY.EXE — Portfolio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;}

  :root{
    --cyan:   #00FFD1;
    --purple: #7C3AED;
    --amber:  #F59E0B;
    --red:    #EF4444;
    --white:  #F1F5F9;
    --dim:    #64748B;
    --bg:     #030712;
    --card:   #0A0F1E;
  }

  html,body{
    width:100%;height:100%;
    background:var(--bg);
    color:var(--white);
    font-family:'Share Tech Mono', monospace;
    overflow:hidden;
    user-select:none;
  }

  /* ── STARS ─────────────────────────────────────────── */
  #stars{position:fixed;inset:0;pointer-events:none;z-index:0;}

  /* ── BOOT SCREEN ───────────────────────────────────── */
  #boot{
    position:fixed;inset:0;z-index:100;
    background:var(--bg);
    display:flex;flex-direction:column;
    justify-content:center;align-items:flex-start;
    padding:10vw;
  }
  #boot-lines{
    font-size:clamp(11px,1.4vw,15px);
    line-height:1.9;
    color:var(--cyan);
    max-width:700px;
  }
  #boot-lines .dim{color:var(--dim);}
  #boot-lines .amber{color:var(--amber);}
  #boot-lines .red{color:var(--red);}
  #boot-lines .white{color:var(--white);}
  #cursor{
    display:inline-block;width:10px;height:1.1em;
    background:var(--cyan);vertical-align:middle;
    animation:blink .7s step-end infinite;
  }
  @keyframes blink{50%{opacity:0;}}

  #boot-cta{
    margin-top:32px;
    font-family:'Orbitron',sans-serif;
    font-size:clamp(12px,1.6vw,16px);
    letter-spacing:.15em;
    color:var(--bg);
    background:var(--cyan);
    border:none;padding:14px 36px;
    cursor:pointer;
    clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);
    transition:transform .15s,box-shadow .15s;
    display:none;
  }
  #boot-cta:hover{transform:scale(1.04);box-shadow:0 0 28px var(--cyan);}

  /* ── GALAXY ────────────────────────────────────────── */
  #galaxy{
    position:fixed;inset:0;z-index:10;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  #galaxy-label{
    font-family:'Orbitron',sans-serif;
    font-size:clamp(10px,1.2vw,13px);
    letter-spacing:.3em;
    color:var(--dim);
    text-transform:uppercase;
    position:fixed;top:28px;left:50%;transform:translateX(-50%);
    white-space:nowrap;
  }
  #galaxy-sub{
    font-size:clamp(9px,1vw,12px);
    color:var(--dim);
    position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
    white-space:nowrap;
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.4;}50%{opacity:1;}}

  #canvas{display:block;cursor:crosshair;}

  /* ── PROJECT CARD ──────────────────────────────────── */
  #card-overlay{
    position:fixed;inset:0;z-index:50;
    background:rgba(3,7,18,.85);
    backdrop-filter:blur(6px);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  #card{
    background:var(--card);
    border:1px solid var(--accent-color, var(--cyan));
    max-width:600px;width:100%;
    clip-path:polygon(16px 0%,100% 0%,100% calc(100% - 16px),calc(100% - 16px) 100%,0% 100%,0% 16px);
    padding:36px 40px;
    position:relative;
    animation:cardIn .35s cubic-bezier(.22,1,.36,1);
  }
  @keyframes cardIn{from{opacity:0;transform:scale(.88) translateY(20px);}to{opacity:1;transform:none;}}

  #card-corner-tl,#card-corner-br{
    position:absolute;width:18px;height:18px;
    border-color:var(--accent-color, var(--cyan));
    border-style:solid;
  }
  #card-corner-tl{top:-1px;left:-1px;border-width:2px 0 0 2px;}
  #card-corner-br{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}

  #card-tag{
    font-size:11px;letter-spacing:.25em;
    color:var(--accent-color, var(--cyan));
    text-transform:uppercase;margin-bottom:10px;
  }
  #card-name{
    font-family:'Orbitron',sans-serif;
    font-size:clamp(18px,2.5vw,26px);
    font-weight:900;
    color:var(--white);
    margin-bottom:14px;
    line-height:1.15;
  }
  #card-stack{
    display:flex;flex-wrap:wrap;gap:7px;
    margin-bottom:18px;
  }
  .stack-pill{
    font-size:11px;padding:3px 10px;
    border:1px solid var(--accent-color, var(--cyan));
    color:var(--accent-color, var(--cyan));
    letter-spacing:.08em;
  }
  #card-desc{
    font-family:system-ui,sans-serif;
    font-size:clamp(13px,1.4vw,15px);
    line-height:1.7;
    color:#94A3B8;
    margin-bottom:28px;
  }
  #card-links{display:flex;gap:14px;flex-wrap:wrap;}
  .card-btn{
    font-family:'Share Tech Mono',monospace;
    font-size:13px;
    padding:10px 22px;
    border:1px solid currentColor;
    text-decoration:none;
    letter-spacing:.08em;
    transition:background .18s,color .18s;
    cursor:pointer;
  }
  .card-btn.primary{
    color:var(--bg);
    background:var(--accent-color, var(--cyan));
    border-color:var(--accent-color, var(--cyan));
  }
  .card-btn.primary:hover{opacity:.85;}
  .card-btn.secondary{color:var(--dim);border-color:var(--dim);}
  .card-btn.secondary:hover{color:var(--white);border-color:var(--white);}
  .card-btn.back{
    color:var(--dim);border-color:transparent;
    padding:10px 0;margin-left:auto;
  }
  .card-btn.back:hover{color:var(--white);}

  #card-id{
    position:absolute;top:14px;right:18px;
    font-size:10px;color:var(--dim);letter-spacing:.15em;
  }

  /* ── SCANLINE overlay ──────────────────────────────── */
  #scanlines{
    position:fixed;inset:0;pointer-events:none;z-index:200;
    background:repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,.07) 3px,
      rgba(0,0,0,.07) 4px
    );
  }

  /* ── HUD corners ───────────────────────────────────── */
  .hud{position:fixed;z-index:20;pointer-events:none;}
  #hud-tl{top:16px;left:16px;border-top:1px solid var(--dim);border-left:1px solid var(--dim);width:40px;height:40px;}
  #hud-tr{top:16px;right:16px;border-top:1px solid var(--dim);border-right:1px solid var(--dim);width:40px;height:40px;}
  #hud-bl{bottom:16px;left:16px;border-bottom:1px solid var(--dim);border-left:1px solid var(--dim);width:40px;height:40px;}
  #hud-br{bottom:16px;right:16px;border-bottom:1px solid var(--dim);border-right:1px solid var(--dim);width:40px;height:40px;}

  /* ── TOOLTIP ───────────────────────────────────────── */
  #tooltip{
    position:fixed;pointer-events:none;z-index:30;
    background:rgba(10,15,30,.95);
    border:1px solid var(--dim);
    padding:8px 14px;font-size:12px;
    color:var(--white);letter-spacing:.05em;
    transform:translate(16px,-50%);
    display:none;white-space:nowrap;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div id="scanlines"></div>
<div class="hud" id="hud-tl"></div>
<div class="hud" id="hud-tr"></div>
<div class="hud" id="hud-bl"></div>
<div class="hud" id="hud-br"></div>

<!-- BOOT -->
<div id="boot">
  <div id="boot-lines"></div>
  <button id="boot-cta" onclick="enterGalaxy()">ENTER THE SYSTEM &nbsp;›</button>
</div>

<!-- GALAXY -->
<div id="galaxy">
  <div id="galaxy-label">JESSY.EXE — PROJECT GALAXY // SELECT A PLANET TO DOCK</div>
  <canvas id="canvas"></canvas>
  <div id="galaxy-sub">[ click any planet to explore ]</div>
</div>

<!-- PROJECT CARD -->
<div id="card-overlay">
  <div id="card">
    <div id="card-corner-tl"></div>
    <div id="card-corner-br"></div>
    <div id="card-id"></div>
    <div id="card-tag"></div>
    <div id="card-name"></div>
    <div id="card-stack"></div>
    <div id="card-desc"></div>
    <div id="card-links"></div>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ── DATA ────────────────────────────────────────────────
const PROJECTS = [
  {
    id:"SYS-001",
    name:"DocRank",
    tag:"Healthcare · Full-Stack",
    color:"#00FFD1",
    stack:["Django","React","TypeScript","JWT+OTP","Supabase","Render"],
    desc:"Doctor discovery and review platform for Kenya. Patients find, rate, and save trusted specialists across Nairobi, Kisumu, and Mombasa. Built with OTP-verified auth, merit-based ranking engine, real-time search, and optimistic UI.",
    live:"https://docrank.jbnmedia.org",
    frontend:"https://github.com/JessyWaweru/DOCTOR_SEARCH_FRONTEND",
    backend:"https://github.com/JessyWaweru/DOCTOR_SEARCH_BACKEND",
    orbit:130, speed:.0007, angle:0.4, size:22,
  },
  {
    id:"SYS-002",
    name:"ShopCrawl",
    tag:"AI · Price Intelligence",
    color:"#F59E0B",
    stack:["Django","React.js","Web Crawler","JWT","Render"],
    desc:"AI-powered price comparison engine that crawls Amazon and Jumia in real time. Applies actuarial Cost-Benefit and Marginal Benefit ratios to rank deals — turning raw e-commerce data into consumer utility scores.",
    live:"https://shopcrawl-frontend.onrender.com",
    frontend:"https://github.com/JessyWaweru/SHOPCRAWL-FRONTEND",
    backend:"https://github.com/JessyWaweru/SHOPCRAWL-BACKEND-PY",
    orbit:210, speed:.0005, angle:1.9, size:19,
  },
  {
    id:"SYS-003",
    name:"Tamasha",
    tag:"Entertainment · Data Aggregation",
    color:"#A855F7",
    stack:["Django","React","TypeScript","Cloudscraper","Clerk","shadcn/ui"],
    desc:"Cinema aggregator and event management platform for Nairobi. Bypasses Cloudflare enterprise bot protection to scrape real-time showtimes. Deeply nested DRF serializers deliver Events → Cinemas → Showtimes in single-payload REST endpoints.",
    live:"https://tamasha.onrender.com",
    frontend:"https://github.com/JessyWaweru/TAMASHA-FRONTEND",
    backend:"https://github.com/JessyWaweru/TAMASHA-BACKEND",
    orbit:295, speed:.00035, angle:3.7, size:17,
  },
  {
    id:"SYS-004",
    name:"Freelancer CRM",
    tag:"SaaS · Client Management",
    color:"#38BDF8",
    stack:["Django","React","TypeScript","JWT","Framer Motion","GitHub Pages"],
    desc:"Private client relationship manager for independent freelancers. Multi-currency project tracking (USD, KES, EUR, GBP), granular payment states, and object-level JWT isolation — your data is invisble to every other user at the API level.",
    live:"https://jessywaweru.github.io/freelancer-crm-ui/",
    frontend:"https://github.com/JessyWaweru/freelancer-crm-ui",
    backend:"https://github.com/JessyWaweru/FREELANCER_CRM",
    orbit:375, speed:.00025, angle:5.1, size:16,
  },
  {
    id:"SYS-005",
    name:"Actuarial Risk Model",
    tag:"Actuarial · Python CLI",
    color:"#EF4444",
    stack:["Python","Monte Carlo","VaR/TVaR","ARIMA","NumPy","Matplotlib"],
    desc:"Modular CLI toolkit for core insurance analytics. Supports premium pricing, stochastic loss simulation across four distributions, reinsurance excess-of-loss layer pricing, and configurable VaR/TVaR risk metrics. The actuarial engine behind the engineering portfolio.",
    live:null,
    backend:"https://github.com/JessyWaweru/ACTUARIAL_RISK_MODEL",
    orbit:445, speed:.0002, angle:2.2, size:14,
  },
];

// ── STARS ────────────────────────────────────────────────
(function(){
  const c=document.getElementById('stars');
  const ctx=c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  const stars=Array.from({length:280},()=>({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    r:Math.random()*1.2+.2,
    o:Math.random()*.7+.1,
    s:Math.random()*.4+.05,
    d:Math.random()>0.5?1:-1,
    t:Math.random()*Math.PI*2,
  }));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.t+=s.s*0.016;
      const o=s.o+Math.sin(s.t)*0.3;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(241,245,249,${Math.max(0,Math.min(1,o))})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── BOOT SEQUENCE ─────────────────────────────────────────
const bootLines=[
  {t:'dim', text:'JESSY.EXE v2.6.0 — KERNEL BOOT'},
  {t:'dim', text:'━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━'},
  {t:'dim', text:''},
  {t:'cyan', text:'[ OK ]  Mounting actuarial subsystem...'},
  {t:'cyan', text:'[ OK ]  Loading Django REST cores...'},
  {t:'cyan', text:'[ OK ]  Initialising React renderer...'},
  {t:'cyan', text:'[ OK ]  Connecting Supabase PostgreSQL...'},
  {t:'cyan', text:'[ OK ]  JWT encryption layer: ACTIVE'},
  {t:'dim',  text:''},
  {t:'amber', text:'[ SCAN ] Detecting project nodes in local galaxy...'},
  {t:'amber', text:'[ SCAN ] SYS-001  DocRank .................. ONLINE'},
  {t:'amber', text:'[ SCAN ] SYS-002  ShopCrawl ................ ONLINE'},
  {t:'amber', text:'[ SCAN ] SYS-003  Tamasha .................. ONLINE'},
  {t:'amber', text:'[ SCAN ] SYS-004  Freelancer CRM ........... ONLINE'},
  {t:'amber', text:'[ SCAN ] SYS-005  Actuarial Risk Model ..... ONLINE'},
  {t:'dim',  text:''},
  {t:'white', text:'OPERATOR  : JESSY BRYAN WAWERU'},
  {t:'white', text:'CLEARANCE : FULL-STACK + ACTUARIAL'},
  {t:'white', text:'STACK     : Python · Django · React · TypeScript · R'},
  {t:'dim',  text:''},
  {t:'cyan', text:'System ready. 5 project nodes mapped.'},
  {t:'cyan', text:'Awaiting operator command...'},
];

let lineIdx=0, charIdx=0, container=document.getElementById('boot-lines');
const cta=document.getElementById('boot-cta');

function typeNext(){
  if(lineIdx>=bootLines.length){
    cta.style.display='block';return;
  }
  const line=bootLines[lineIdx];
  if(charIdx===0){
    const el=document.createElement('div');
    el.className=line.t;
    el.id='cur-line';
    container.appendChild(el);
  }
  const el=container.querySelector('#cur-line');
  if(charIdx<line.text.length){
    el.textContent+=line.text[charIdx];
    charIdx++;
    setTimeout(typeNext, line.text.length===0?0:18+Math.random()*12);
  } else {
    el.removeAttribute('id');
    lineIdx++;charIdx=0;
    setTimeout(typeNext, line.text.length===0?30:60);
  }
}
setTimeout(typeNext,400);

// ── GALAXY ────────────────────────────────────────────────
let canvas,ctx,W,H,CX,CY,animId;
let hoveredPlanet=null;
const tooltip=document.getElementById('tooltip');

function enterGalaxy(){
  document.getElementById('boot').style.opacity=0;
  document.getElementById('boot').style.transition='opacity .6s';
  setTimeout(()=>{
    document.getElementById('boot').style.display='none';
    const g=document.getElementById('galaxy');
    g.style.display='flex';
    initGalaxy();
  },600);
}

function initGalaxy(){
  canvas=document.getElementById('canvas');
  ctx=canvas.getContext('2d');
  resize();
  window.addEventListener('resize',resize);
  canvas.addEventListener('mousemove',onMouseMove);
  canvas.addEventListener('click',onClick);
  canvas.addEventListener('mouseleave',()=>{
    hoveredPlanet=null;
    tooltip.style.display='none';
    canvas.style.cursor='crosshair';
  });
  loop();
}

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
  CX=W/2;CY=H/2;
}

function loop(){
  animId=requestAnimationFrame(loop);
  ctx.clearRect(0,0,W,H);

  // centre star
  const grad=ctx.createRadialGradient(CX,CY,0,CX,CY,60);
  grad.addColorStop(0,'rgba(200,220,255,.9)');
  grad.addColorStop(.3,'rgba(120,160,255,.3)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(CX,CY,60,0,Math.PI*2);
  ctx.fillStyle=grad;ctx.fill();

  ctx.beginPath();ctx.arc(CX,CY,14,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();

  // label
  ctx.font='10px Share Tech Mono';
  ctx.fillStyle='rgba(100,116,139,.8)';
  ctx.textAlign='center';
  ctx.fillText('JESSY.EXE',CX,CY+28);

  PROJECTS.forEach(p=>{
    p.angle+=p.speed;
    const px=CX+Math.cos(p.angle)*p.orbit;
    const py=CY+Math.sin(p.angle)*p.orbit*0.38; // ellipse

    // orbit ring
    ctx.beginPath();
    ctx.ellipse(CX,CY,p.orbit,p.orbit*0.38,0,0,Math.PI*2);
    ctx.strokeStyle='rgba(100,116,139,.12)';
    ctx.lineWidth=1;ctx.stroke();

    // glow
    const isHov=hoveredPlanet===p;
    const glowR=p.size+(isHov?12:6);
    const glow=ctx.createRadialGradient(px,py,0,px,py,glowR*2);
    glow.addColorStop(0,p.color+'88');
    glow.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(px,py,glowR*2,0,Math.PI*2);
    ctx.fillStyle=glow;ctx.fill();

    // planet body
    const planet=ctx.createRadialGradient(px-p.size*.3,py-p.size*.3,p.size*.1,px,py,p.size);
    planet.addColorStop(0,'#fff');
    planet.addColorStop(.2,p.color);
    planet.addColorStop(1,p.color+'44');
    ctx.beginPath();ctx.arc(px,py,p.size+(isHov?3:0),0,Math.PI*2);
    ctx.fillStyle=planet;ctx.fill();

    if(isHov){
      ctx.beginPath();ctx.arc(px,py,p.size+6,0,Math.PI*2);
      ctx.strokeStyle=p.color;ctx.lineWidth=1.5;ctx.stroke();
    }

    // label
    ctx.font=`${isHov?13:11}px Share Tech Mono`;
    ctx.fillStyle=isHov?p.color:'rgba(241,245,249,.6)';
    ctx.textAlign='center';
    ctx.fillText(p.name,px,py+p.size+16);

    p._px=px;p._py=py;
  });

  ctx.textAlign='left';
}

function getPlanetAt(mx,my){
  return PROJECTS.find(p=>{
    const dx=mx-p._px,dy=my-p._py;
    return Math.sqrt(dx*dx+dy*dy)<p.size+14;
  });
}

function onMouseMove(e){
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const hit=getPlanetAt(mx,my);
  hoveredPlanet=hit||null;
  canvas.style.cursor=hit?'pointer':'crosshair';
  if(hit){
    tooltip.style.display='block';
    tooltip.style.left=e.clientX+'px';
    tooltip.style.top=e.clientY+'px';
    tooltip.textContent=`${hit.id} — ${hit.name} // CLICK TO DOCK`;
  } else {
    tooltip.style.display='none';
  }
}

function onClick(e){
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const hit=getPlanetAt(mx,my);
  if(hit) openCard(hit);
}

// ── CARD ──────────────────────────────────────────────────
function openCard(p){
  const overlay=document.getElementById('card-overlay');
  const card=document.getElementById('card');

  card.style.setProperty('--accent-color',p.color);
  card.style.borderColor=p.color;
  document.getElementById('card-corner-tl').style.borderColor=p.color;
  document.getElementById('card-corner-br').style.borderColor=p.color;

  document.getElementById('card-id').textContent=p.id;
  document.getElementById('card-tag').textContent=`// ${p.tag}`;
  document.getElementById('card-tag').style.color=p.color;
  document.getElementById('card-name').textContent=p.name;

  const stackEl=document.getElementById('card-stack');
  stackEl.innerHTML='';
  p.stack.forEach(s=>{
    const pill=document.createElement('span');
    pill.className='stack-pill';
    pill.textContent=s;
    pill.style.borderColor=p.color;
    pill.style.color=p.color;
    stackEl.appendChild(pill);
  });

  document.getElementById('card-desc').textContent=p.desc;

  const links=document.getElementById('card-links');
  links.innerHTML='';

  function makeLink(href, label, cls, color){
    const a=document.createElement('a');
    a.href=href;
    a.target='_blank';
    a.rel='noopener noreferrer';
    a.className='card-btn '+cls;
    a.textContent=label;
    a.style.pointerEvents='all';
    a.style.position='relative';
    a.style.zIndex='999';
    if(cls==='primary'){
      a.style.background=color;
      a.style.borderColor=color;
      a.style.color='#030712';
    }
    a.addEventListener('click',function(e){ e.stopPropagation(); });
    return a;
  }

  if(p.live)     links.appendChild(makeLink(p.live,     'LAUNCH APP \u203a',    'primary',   p.color));
  if(p.frontend) links.appendChild(makeLink(p.frontend, 'FRONTEND CODE',   'secondary', p.color));
  if(p.backend)  links.appendChild(makeLink(p.backend,  p.frontend ? 'BACKEND CODE' : 'SOURCE CODE', 'secondary', p.color));

  const back=document.createElement('button');
  back.className='card-btn back';back.textContent='\u2190 UNDOCK';
  back.onclick=function(e){ e.stopPropagation(); closeCard(); };
  links.appendChild(back);

  overlay.style.display='flex';
  overlay.onclick=function(e){
    if(e.target===overlay) closeCard();
  };
}

function closeCard(){
  const overlay=document.getElementById('card-overlay');
  overlay.style.opacity=0;
  overlay.style.transition='opacity .25s';
  setTimeout(()=>{
    overlay.style.display='none';
    overlay.style.opacity=1;
    overlay.style.transition='';
  },250);
}

// close card on Escape
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeCard();
});
</script>

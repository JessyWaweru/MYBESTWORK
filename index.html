<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jessy Waweru — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --void:    #04050D;
  --teal:    #00D4B8;
  --gold:    #FFB547;
  --rose:    #FF6B9D;
  --indigo:  #6366F1;
  --ice:     #E8F4FF;
  --dim:     rgba(232,244,255,0.35);
  --glass:   rgba(10,12,28,0.82);
}

html,body{
  width:100%;height:100%;
  background:var(--void);
  color:var(--ice);
  font-family:'Space Grotesk',sans-serif;
  overflow:hidden;
}

/* ── CANVAS ── */
#nebula{
  position:fixed;inset:0;
  z-index:0;
}

/* ── HUD HEADER ── */
#hud{
  position:fixed;top:0;left:0;right:0;
  z-index:20;
  padding:28px 40px;
  display:flex;justify-content:space-between;align-items:flex-start;
  pointer-events:none;
}
#hud-name{
  font-size:clamp(13px,1.3vw,15px);
  font-weight:500;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--ice);
  opacity:.9;
}
#hud-role{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(10px,1vw,12px);
  color:var(--teal);
  letter-spacing:.08em;
  margin-top:4px;
  opacity:.8;
}
#hud-right{
  text-align:right;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--dim);
  letter-spacing:.06em;
  line-height:1.9;
}

/* ── CENTRE HERO ── */
#hero{
  position:fixed;inset:0;
  z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  pointer-events:none;
  text-align:center;
}
#hero-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(10px,1.1vw,12px);
  letter-spacing:.3em;
  text-transform:uppercase;
  color:var(--teal);
  opacity:0;
  transform:translateY(12px);
  animation:fadeUp .8s .3s cubic-bezier(.22,1,.36,1) forwards;
}
#hero-name{
  font-size:clamp(42px,7vw,96px);
  font-weight:700;
  letter-spacing:-.02em;
  line-height:1;
  color:var(--ice);
  margin:14px 0 16px;
  opacity:0;
  transform:translateY(18px);
  animation:fadeUp .9s .5s cubic-bezier(.22,1,.36,1) forwards;
}
#hero-name span{
  background:linear-gradient(135deg,var(--teal),var(--indigo));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
#hero-sub{
  font-size:clamp(13px,1.4vw,16px);
  font-weight:300;
  color:var(--dim);
  letter-spacing:.04em;
  max-width:480px;
  line-height:1.6;
  opacity:0;
  transform:translateY(12px);
  animation:fadeUp .8s .7s cubic-bezier(.22,1,.36,1) forwards;
}
#hero-hint{
  margin-top:40px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:.2em;
  color:var(--dim);
  opacity:0;
  animation:fadeUp .8s 1.4s cubic-bezier(.22,1,.36,1) forwards,
            pulse 3s 2.2s ease-in-out infinite;
}
@keyframes fadeUp{
  to{opacity:1;transform:translateY(0);}
}
@keyframes pulse{
  0%,100%{opacity:.35;}50%{opacity:.7;}
}

/* ── NODE LABELS (canvas overlay) ── */
#labels{
  position:fixed;inset:0;z-index:11;
  pointer-events:none;
}
.node-label{
  position:absolute;
  pointer-events:none;
  text-align:center;
  transform:translate(-50%,-50%);
  transition:opacity .3s;
}
.node-label .nl-name{
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  white-space:nowrap;
}
.node-label .nl-tag{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--dim);
  margin-top:3px;
  white-space:nowrap;
}

/* ── BOTTOM CARD ── */
#card-wrap{
  position:fixed;bottom:0;left:0;right:0;
  z-index:50;
  display:flex;justify-content:center;
  padding:0 20px 32px;
  pointer-events:none;
  transform:translateY(120%);
  transition:transform .55s cubic-bezier(.22,1,.36,1);
}
#card-wrap.open{
  transform:translateY(0);
  pointer-events:all;
}
#card{
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  border:1px solid rgba(232,244,255,.1);
  border-bottom:none;
  border-radius:24px 24px 0 0;
  max-width:760px;width:100%;
  padding:36px 40px 40px;
  position:relative;
  box-shadow:0 -40px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04) inset;
}
#card-drag{
  width:40px;height:4px;
  background:rgba(232,244,255,.2);
  border-radius:2px;
  margin:0 auto 28px;
}
#card-top{
  display:flex;align-items:flex-start;
  justify-content:space-between;
  gap:20px;
  margin-bottom:18px;
}
#card-titles{flex:1;}
#card-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;letter-spacing:.2em;
  text-transform:uppercase;
  margin-bottom:8px;
}
#card-name{
  font-size:clamp(22px,3vw,32px);
  font-weight:700;
  letter-spacing:-.02em;
  line-height:1.1;
  color:var(--ice);
}
#card-close{
  background:rgba(232,244,255,.07);
  border:1px solid rgba(232,244,255,.1);
  color:var(--dim);
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;flex-shrink:0;
  transition:background .2s,color .2s;
  pointer-events:all;
}
#card-close:hover{background:rgba(232,244,255,.14);color:var(--ice);}

#card-desc{
  font-size:clamp(13px,1.4vw,15px);
  line-height:1.75;
  color:rgba(232,244,255,.6);
  margin-bottom:24px;
  font-weight:300;
}
#card-stack{
  display:flex;flex-wrap:wrap;gap:8px;
  margin-bottom:28px;
}
.pill{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  padding:5px 12px;
  border-radius:100px;
  border:1px solid;
  letter-spacing:.05em;
}
#card-links{
  display:flex;gap:12px;flex-wrap:wrap;align-items:center;
}
.btn{
  font-family:'Space Grotesk',sans-serif;
  font-size:13px;font-weight:600;
  padding:11px 24px;
  border-radius:100px;
  letter-spacing:.04em;
  text-decoration:none;
  transition:transform .18s,box-shadow .18s,opacity .18s;
  cursor:pointer;border:none;
  display:inline-block;
}
.btn:hover{transform:translateY(-2px);}
.btn.primary{
  color:#04050D;
  box-shadow:0 4px 24px rgba(0,0,0,.3);
}
.btn.primary:hover{box-shadow:0 8px 32px rgba(0,0,0,.4);}
.btn.ghost{
  background:rgba(232,244,255,.07);
  color:rgba(232,244,255,.7);
  border:1px solid rgba(232,244,255,.12);
}
.btn.ghost:hover{background:rgba(232,244,255,.12);color:var(--ice);}

/* ── CORNER MARKS ── */
.corner{position:fixed;z-index:5;pointer-events:none;}
#c-tl{top:0;left:0;border-top:1px solid rgba(232,244,255,.08);border-left:1px solid rgba(232,244,255,.08);width:60px;height:60px;}
#c-tr{top:0;right:0;border-top:1px solid rgba(232,244,255,.08);border-right:1px solid rgba(232,244,255,.08);width:60px;height:60px;}
#c-bl{bottom:0;left:0;border-bottom:1px solid rgba(232,244,255,.08);border-left:1px solid rgba(232,244,255,.08);width:60px;height:60px;}
#c-br{bottom:0;right:0;border-bottom:1px solid rgba(232,244,255,.08);border-right:1px solid rgba(232,244,255,.08);width:60px;height:60px;}

/* ── CURSOR GLOW ── */
#cursor-glow{
  position:fixed;
  width:400px;height:400px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(0,212,184,.07) 0%, transparent 70%);
  pointer-events:none;
  z-index:1;
  transform:translate(-50%,-50%);
  transition:opacity .4s;
}

/* ── SCANLINES ── */
#scanlines{
  position:fixed;inset:0;z-index:100;pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    transparent 0px,transparent 2px,
    rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 3px
  );
}

@media(max-width:600px){
  #hud{padding:20px 24px;}
  #card{padding:28px 24px 32px;}
  #hero-name{font-size:clamp(36px,12vw,64px);}
}
</style>
</head>
<body>

<canvas id="nebula"></canvas>
<div id="scanlines"></div>
<div id="cursor-glow"></div>

<div class="corner" id="c-tl"></div>
<div class="corner" id="c-tr"></div>
<div class="corner" id="c-bl"></div>
<div class="corner" id="c-br"></div>

<div id="hud">
  <div>
    <div id="hud-name">Jessy Bryan Waweru</div>
    <div id="hud-role">full-stack engineer · actuarial scientist</div>
  </div>
  <div id="hud-right">
    <div>nairobi, kenya</div>
    <div>bryanjessywaweru@gmail.com</div>
    <div>github.com/JessyWaweru</div>
  </div>
</div>

<div id="hero">
  <div id="hero-eyebrow">Portfolio · 2025</div>
  <div id="hero-name">My Best <span>Work</span></div>
  <div id="hero-sub">Engineer who builds systems that are analytically rigorous, not just functional. Hover the star clusters.</div>
  <div id="hero-hint">· · · move your cursor · · ·</div>
</div>

<div id="labels"></div>

<div id="card-wrap">
  <div id="card">
    <div id="card-drag"></div>
    <div id="card-top">
      <div id="card-titles">
        <div id="card-eyebrow"></div>
        <div id="card-name"></div>
      </div>
      <button id="card-close" onclick="closeCard()">✕</button>
    </div>
    <div id="card-desc"></div>
    <div id="card-stack"></div>
    <div id="card-links"></div>
  </div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────
const PROJECTS = [
  {
    name:"DocRank",
    tag:"Healthcare · Full-Stack",
    color:"#00D4B8",
    stack:["Django","React","TypeScript","JWT + OTP","Supabase","Render"],
    desc:"Doctor discovery and review platform for Kenya. Patients find, rate, and save trusted specialists across Nairobi, Kisumu, and Mombasa — powered by OTP-verified auth, a merit-based ranking engine, and real-time debounced search.",
    live:"https://docrank.jbnmedia.org",
    frontend:"https://github.com/JessyWaweru/DOCTOR_SEARCH_FRONTEND",
    backend:"https://github.com/JessyWaweru/DOCTOR_SEARCH_BACKEND",
  },
  {
    name:"ShopCrawl",
    tag:"AI · Price Intelligence",
    color:"#FFB547",
    stack:["Django","React.js","Web Crawler","JWT","Render"],
    desc:"AI price comparison engine crawling Amazon and Jumia in real time. Applies actuarial Cost-Benefit and Marginal Benefit ratios to rank deals — turning raw e-commerce data into consumer utility scores.",
    live:"https://shopcrawl-frontend.onrender.com",
    frontend:"https://github.com/JessyWaweru/SHOPCRAWL-FRONTEND",
    backend:"https://github.com/JessyWaweru/SHOPCRAWL-BACKEND-PY",
  },
  {
    name:"Tamasha",
    tag:"Entertainment · Aggregation",
    color:"#A78BFA",
    stack:["Django","React","TypeScript","Cloudscraper","Clerk","shadcn/ui"],
    desc:"Cinema aggregator for Nairobi that bypasses Cloudflare enterprise bot protection. Deeply nested DRF serializers deliver Events → Cinemas → Showtimes in single-payload REST endpoints.",
    live:"https://tamasha.onrender.com",
    frontend:"https://github.com/JessyWaweru/TAMASHA-FRONTEND",
    backend:"https://github.com/JessyWaweru/TAMASHA-BACKEND",
  },
  {
    name:"Freelancer CRM",
    tag:"SaaS · Client Management",
    color:"#60A5FA",
    stack:["Django","React","TypeScript","JWT","Framer Motion","GitHub Pages"],
    desc:"Private client relationship manager with multi-currency project tracking (USD, KES, EUR, GBP). Object-level JWT isolation means your data is completely invisible to every other user at the API level.",
    live:"https://jessywaweru.github.io/freelancer-crm-ui/",
    frontend:"https://github.com/JessyWaweru/freelancer-crm-ui",
    backend:"https://github.com/JessyWaweru/FREELANCER_CRM",
  },
  {
    name:"Actuarial Risk Model",
    tag:"Actuarial · Python CLI",
    color:"#FB7185",
    stack:["Python","Monte Carlo","VaR / TVaR","ARIMA","NumPy","Matplotlib"],
    desc:"Modular CLI toolkit for core insurance analytics — premium pricing, stochastic loss simulation across four distributions, reinsurance excess-of-loss pricing, and configurable VaR/TVaR risk metrics.",
    live:null,
    frontend:null,
    backend:"https://github.com/JessyWaweru/ACTUARIAL_RISK_MODEL",
  },
];

// ── NEBULA PARTICLE SYSTEM ────────────────────────────────
const canvas = document.getElementById('nebula');
const ctx    = canvas.getContext('2d');
let W, H, mouse = {x:null, y:null};
let particles = [], nodes = [];
let hoveredNode = null;
let dpr = Math.min(window.devicePixelRatio || 1, 2);

function resize(){
  W = canvas.width  = innerWidth  * dpr;
  H = canvas.height = innerHeight * dpr;
  canvas.style.width  = innerWidth  + 'px';
  canvas.style.height = innerHeight + 'px';
  ctx.scale(dpr, dpr);
  placeNodes();
  initParticles();
}

// ── NODE POSITIONS ─────────────────────────────────────────
function placeNodes(){
  const iw = innerWidth, ih = innerHeight;
  const positions = [
    {x: iw*.22, y: ih*.38},
    {x: iw*.72, y: ih*.28},
    {x: iw*.55, y: ih*.65},
    {x: iw*.30, y: ih*.68},
    {x: iw*.78, y: ih*.62},
  ];
  nodes = PROJECTS.map((p,i)=>({
    ...p,
    x: positions[i].x,
    y: positions[i].y,
    r: 0,
    targetR: 28,
    hovered: false,
    labelEl: null,
  }));
  buildLabels();
}

// ── LABEL ELEMENTS ─────────────────────────────────────────
function buildLabels(){
  const container = document.getElementById('labels');
  container.innerHTML = '';
  nodes.forEach((n,i)=>{
    const el = document.createElement('div');
    el.className = 'node-label';
    el.innerHTML = `<div class="nl-name" style="color:${n.color}">${n.name}</div>
                    <div class="nl-tag">${n.tag}</div>`;
    el.style.opacity = '0';
    el.style.left = n.x + 'px';
    el.style.top  = (n.y + 44) + 'px';
    container.appendChild(el);
    n.labelEl = el;
    // fade in staggered
    setTimeout(()=>{ el.style.transition='opacity .8s'; el.style.opacity='1'; }, 1600 + i*200);
  });
}

// ── PARTICLES ─────────────────────────────────────────────
function initParticles(){
  const count = Math.min(800, Math.floor(innerWidth * innerHeight / 2400));
  particles = Array.from({length: count}, ()=> makeParticle());
}

function makeParticle(near){
  const iw = innerWidth, ih = innerHeight;
  let x, y;
  if(near && Math.random() > .5){
    // cluster near a random node
    const n = nodes[Math.floor(Math.random()*nodes.length)];
    const a = Math.random()*Math.PI*2;
    const d = Math.random()*120 + 20;
    x = n.x + Math.cos(a)*d;
    y = n.y + Math.sin(a)*d;
  } else {
    x = Math.random()*iw;
    y = Math.random()*ih;
  }
  // colour: mostly ice/dim, some tinted near nodes
  const colors = ['rgba(232,244,255,', 'rgba(0,212,184,', 'rgba(99,102,241,', 'rgba(255,181,71,'];
  const c = colors[Math.floor(Math.random()*colors.length)];
  const alpha = Math.random()*.5 + .05;
  return {
    x, y,
    ox: x, oy: y,            // origin
    vx: (Math.random()-.5)*.18,
    vy: (Math.random()-.5)*.18,
    r: Math.random()*1.4 + .3,
    color: c + alpha + ')',
    t: Math.random()*Math.PI*2,
    speed: Math.random()*.006 + .002,
    wander: Math.random()*30 + 10,   // drift radius
  };
}

// ── ANIMATION LOOP ─────────────────────────────────────────
let lastTime = 0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt = Math.min(ts - lastTime, 32);
  lastTime = ts;

  ctx.clearRect(0, 0, innerWidth, innerHeight);

  // deep background glow blobs
  drawGlowBlob(innerWidth*.2, innerHeight*.35, 280, 'rgba(0,212,184,.025)');
  drawGlowBlob(innerWidth*.75, innerHeight*.28, 220, 'rgba(99,102,241,.03)');
  drawGlowBlob(innerWidth*.55, innerHeight*.7, 200, 'rgba(255,107,157,.02)');
  drawGlowBlob(innerWidth*.35, innerHeight*.65, 180, 'rgba(255,181,71,.02)');

  // particles
  particles.forEach(p=>{
    p.t += p.speed;
    // gentle sinusoidal wander around origin
    let tx = p.ox + Math.cos(p.t) * p.wander;
    let ty = p.oy + Math.sin(p.t * 1.3) * p.wander;

    // mouse gravity
    if(mouse.x !== null){
      const dx = mouse.x - p.x;
      const dy = mouse.y - p.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < 180){
        const force = (180-dist)/180 * .6;
        tx += dx * force;
        ty += dy * force;
      }
    }

    p.x += (tx - p.x) * .015;
    p.y += (ty - p.y) * .015;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
  });

  // node clusters + connection lines
  nodes.forEach((n, i)=>{
    // animate radius in
    n.r += (n.targetR - n.r) * .06;

    const isHov = n.hovered;

    // draw subtle lines to nearby particles
    particles.forEach(p=>{
      const dx = p.x - n.x, dy = p.y - n.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if(d < 90){
        ctx.beginPath();
        ctx.moveTo(n.x, n.y);
        ctx.lineTo(p.x, p.y);
        const a = (1 - d/90) * .12 * (isHov ? 2.5 : 1);
        ctx.strokeStyle = n.color.replace(')',`,${a})`).replace('rgb','rgba').replace('rgba(rgba','rgba');
        // simple approach: use hex color with opacity
        ctx.strokeStyle = hexToRgba(n.color, a);
        ctx.lineWidth = .6;
        ctx.stroke();
      }
    });

    // outer ring (hovered)
    if(isHov){
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r + 14, 0, Math.PI*2);
      ctx.strokeStyle = hexToRgba(n.color, .25);
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r + 26, 0, Math.PI*2);
      ctx.strokeStyle = hexToRgba(n.color, .1);
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // glow halo
    const haloR = n.r * (isHov ? 3.2 : 2.2);
    const halo = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,haloR);
    halo.addColorStop(0, hexToRgba(n.color, isHov ? .45 : .25));
    halo.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(n.x, n.y, haloR, 0, Math.PI*2);
    ctx.fillStyle = halo;
    ctx.fill();

    // core dot
    const body = ctx.createRadialGradient(n.x - n.r*.25, n.y - n.r*.25, 1, n.x, n.y, n.r);
    body.addColorStop(0, '#ffffff');
    body.addColorStop(.3, n.color);
    body.addColorStop(1, hexToRgba(n.color, .6));
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r*(isHov?1.15:1), 0, Math.PI*2);
    ctx.fillStyle = body;
    ctx.fill();

    // update label position
    if(n.labelEl){
      n.labelEl.style.left = n.x + 'px';
      n.labelEl.style.top  = (n.y + n.r + 18) + 'px';
      n.labelEl.style.opacity = isHov ? '1' : '.55';
    }
  });
}

function drawGlowBlob(x,y,r,color){
  const g = ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0, color);
  g.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=g;ctx.fill();
}

function hexToRgba(hex, alpha){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── INTERACTION ───────────────────────────────────────────
const cursorGlow = document.getElementById('cursor-glow');

window.addEventListener('mousemove', e=>{
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  cursorGlow.style.left = e.clientX + 'px';
  cursorGlow.style.top  = e.clientY + 'px';
  checkHover(e.clientX, e.clientY);
});

window.addEventListener('mouseleave', ()=>{ mouse.x = mouse.y = null; });

canvas.addEventListener('click', e=>{
  const hit = getNodeAt(e.clientX, e.clientY);
  if(hit) openCard(hit);
});

// touch
canvas.addEventListener('touchend', e=>{
  const t = e.changedTouches[0];
  const hit = getNodeAt(t.clientX, t.clientY);
  if(hit) openCard(hit);
  e.preventDefault();
},{passive:false});

function getNodeAt(mx,my){
  return nodes.find(n=>{
    const dx=mx-n.x, dy=my-n.y;
    return Math.sqrt(dx*dx+dy*dy) < n.r + 22;
  }) || null;
}

function checkHover(mx,my){
  let any = false;
  nodes.forEach(n=>{
    const hit = getNodeAt(mx,my) === n;
    n.hovered = hit;
    if(hit){ any=true; n.targetR=34; }
    else n.targetR=28;
  });
  canvas.style.cursor = any ? 'pointer' : 'default';
}

// ── CARD ──────────────────────────────────────────────────
function openCard(p){
  const wrap = document.getElementById('card-wrap');

  document.getElementById('card-eyebrow').textContent = p.tag;
  document.getElementById('card-eyebrow').style.color = p.color;
  document.getElementById('card-name').textContent = p.name;
  document.getElementById('card-desc').textContent  = p.desc;

  const stackEl = document.getElementById('card-stack');
  stackEl.innerHTML = '';
  p.stack.forEach(s=>{
    const pill = document.createElement('span');
    pill.className = 'pill';
    pill.textContent = s;
    pill.style.borderColor = hexToRgba(p.color, .4);
    pill.style.color = p.color;
    stackEl.appendChild(pill);
  });

  const links = document.getElementById('card-links');
  links.innerHTML = '';

  function makeBtn(href, label, cls){
    const a = document.createElement('a');
    a.href = href; a.target='_blank'; a.rel='noopener noreferrer';
    a.className = 'btn ' + cls;
    a.textContent = label;
    if(cls === 'primary'){
      a.style.background = p.color;
      a.style.color = '#04050D';
      a.style.boxShadow = `0 4px 28px ${hexToRgba(p.color,.35)}`;
    }
    a.addEventListener('click', e=>e.stopPropagation());
    links.appendChild(a);
  }

  if(p.live)     makeBtn(p.live,     '↗ Launch App',    'primary');
  if(p.frontend) makeBtn(p.frontend, 'Frontend Code',   'ghost');
  if(p.backend)  makeBtn(p.backend,  p.frontend ? 'Backend Code' : 'Source Code', 'ghost');

  wrap.classList.add('open');
}

function closeCard(){
  document.getElementById('card-wrap').classList.remove('open');
}

document.addEventListener('keydown', e=>{
  if(e.key === 'Escape') closeCard();
});

// ── INIT ──────────────────────────────────────────────────
resize();
window.addEventListener('resize', ()=>{ dpr=Math.min(window.devicePixelRatio||1,2); resize(); });
requestAnimationFrame(loop);

// init particles near nodes after a moment
setTimeout(()=>{
  particles = Array.from({length: particles.length}, ()=> makeParticle(true));
}, 400);
</script>
